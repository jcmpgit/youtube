; ℹ️ Note that benchmarking tools also inject paramateres not seen in this config such as seeds and other temperature settings.

; Shared defaults applied to every profile (overridden per profile when set).
[*]
t = 12
b = 2048
flash-attn = on
cache-type-k = q4_0
cache-type-v = q4_0
mlock = true
jinja = true
host = 0.0.0.0
port = 8080
seed = 42

[gemma4-12b]
model = gemma-4-12b-it-IQ4_NL.gguf
mmproj = gemma-4-12b-mmproj/mmproj-BF16.gguf
c = 65536
ngl = 999

[gemma4-12b-q8]
model = gemma-4-12b-it-UD-Q8_K_XL.gguf
mmproj = gemma-4-12b-mmproj/mmproj-BF16.gguf
c = 65536
ngl = 999

[gemma4-12b-qat]
model = gemma-4-12B-it-qat-UD-Q4_K_XL.gguf
mmproj = gemma-4-12b-mmproj/mmproj-BF16.gguf
c = 65536
ngl = 999

[gemma4-12b-qat-q4_0]
model = gemma-4-12b-it-qat-q4_0.gguf
mmproj = gemma-4-12b-mmproj/mmproj-BF16.gguf
c = 65536
ngl = 999

[gemma4-12b-bf16]
model = gemma-4-12b-it-BF16.gguf
mmproj = gemma-4-12b-mmproj/mmproj-BF16.gguf
c = 65536
fit = on
fit-target = 256
np = 1
b = 1024
mlock = false

[gemma4-26b]
model = gemma-4-26B-A4B-it-UD-IQ4_NL.gguf
mmproj = mmproj-BF16.gguf
c = 65536
ngl = 999

[gemma4-26b-q4_k_xl]
model = gemma-4-26B-A4B-it-qat-UD-Q4_K_XL.gguf
mmproj = mmproj-BF16.gguf
c = 65536
ngl = 999

[gemma4-26b-qat]
model = gemma-4-26B_q4_0-it.gguf
mmproj = mmproj-BF16.gguf
c = 65536
fit = on
fit-target = 256
np = 1
b = 1024
mlock = false

; DiffusionGemma — block-diffusion model; needs llama-diffusion-cli (PR #24423), not llama-server.
[diffusiongemma-26b-q4_k_m]
runner = diffusion
model = diffusiongemma-26B-A4B-it-Q4_K_M.gguf
ngl = 25
n = 2048
cnv = on
mlock = false

[qwen3.6]
model = Qwen3.6-35B-A3B-UD-IQ4_NL.gguf
c = 65536
fit = on
fit-target = 256
np = 2

[qwopus3.6]
model = Qwopus3.6-35B-A3B-v1-IQ4_XS.gguf
c = 65536
fit = on
fit-target = 256
np = 2

[qwen3.6-27b]
model = Qwen3.6-27B-IQ4_NL.gguf
c = 65536
fit = on
fit-target = 256
np = 1
spec-type = draft-mtp
spec-draft-n-max = 2

[qwopus3.6-27b-v2]
model = Qwopus3.6-27B-v2-MTP-Q4_K_M.gguf
c = 65536
fit = on
fit-target = 256
np = 1
spec-type = draft-mtp
spec-draft-n-max = 2

